# ============================================================
# Fixly Backend — Application Configuration
# ============================================================

# Server
server.port=8080

# ============================================================
# Database — MySQL
# IMPORTANT: Update these credentials before running!
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fixly_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Akrajth@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Secret (change in production — must be >= 256 bits)
jwt.secret=VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yRml4bHlBcHBsaWNhdGlvblNlY3VyZTEyMzQ1Njc4OTA=
jwt.expiration=86400000

# CORS — allow React dev server
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Data initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.fixly=DEBUG
logging.level.org.springframework.security=WARN
